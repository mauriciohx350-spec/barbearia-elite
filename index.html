<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Barbearia Elite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- MODAL CARRINHO (sempre acima do conteúdo) -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-content">
      <h2>Seu Carrinho</h2>
      <ul id="cart-items"></ul>
      <button class="finalizar" onclick="sendToWhatsApp()">Finalizar no WhatsApp</button>
      <button class="fechar" onclick="closeCart()">Fechar</button>
    </div>
  </div>

  <!-- CONTAINER DE TODO O SITE -->
  <div class="site-content">

    <!-- NAVBAR -->
    <header>
      <div class="cart-icon" onclick="openCart()">🛒 <span id="cart-count">0</span></div>
    </header>

    <!-- HERO -->
    <section class="hero">
      <div class="overlay"></div>
      <div class="hero-content">
        <img src="img/logo.jpeg" class="logo">
        <h1>Barbearia Elite</h1>
        <p>Estilo e precisão no seu corte</p>
      </div>
    </section>

    <!-- SERVIÇOS -->
    <section class="services">
      <h2>Nossos Serviços</h2>
      <div class="services-container">
        <div class="service">
          <img src="img/cabelo.jpg">
          <h3>corte de cabelo</h3>
          <p>R$0</p>
          <button onclick="addToCart('Corte de Cabelo - R$0')">Adicionar ao carrinho</button>
        </div>
        <div class="service">
          <img src="img/barba.jpg">
          <h3>Barba</h3>
          <p>R$0</p>
          <button onclick="addToCart('Barba - R$0')">Adicionar ao carrinho</button>
        </div>
        <div class="service">
          <img src="img/Sombrancelha.jpg">
          <h3>Sombrancelha</h3>
          <p>R$0</p>
          <button onclick="addToCart('Sombrancelha - R$0')">Adicionar ao carrinho</button>
        </div>
      </div>
    </section>

  </div> <!-- Fim do site-content -->

  <!-- BOTÃO FLUTUANTE DO WHATSAPP -->
<a href="https://wa.me/5541984701212?text=Olá!%20Gostaria%20de%20mais%20informações%20sobre%20outros%20serviços." 
   target="_blank" class="whatsapp-float"></a>

  <script src="script.js"></script>
</body>
</html>
